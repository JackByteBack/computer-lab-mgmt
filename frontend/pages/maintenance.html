<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabOS — Maintenance</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><h1>Lab<span>OS</span></h1><p>TCET — BCA Block C</p></div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="index.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
    <a href="computers.html" class="nav-item"><span class="icon">🖥️</span> Computers</a>
    <a href="software.html" class="nav-item"><span class="icon">📦</span> Software</a>
    <a href="maintenance.html" class="nav-item active"><span class="icon">🔧</span> Maintenance</a>
    <a href="usage.html" class="nav-item"><span class="icon">📋</span> Usage Log</a>
  </nav>
  <div class="sidebar-footer"><div id="liveClock">00:00:00</div></div>
</aside>

<main class="main-content">
  <div class="topbar">
    <div>
      <div class="page-title">Maintenance</div>
      <div class="page-subtitle">Track and manage all hardware/software repair tickets</div>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="loadTickets()">↻ Refresh</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ New Ticket</button>
    </div>
  </div>

  <div class="stats-grid" id="mxStats">
    <div class="stat-card"><div class="stat-label">Total Tickets</div><div class="stat-value">–</div></div>
    <div class="stat-card warn"><div class="stat-label">Open</div><div class="stat-value">–</div></div>
    <div class="stat-card info"><div class="stat-label">In Progress</div><div class="stat-value">–</div></div>
    <div class="stat-card accent"><div class="stat-label">Resolved</div><div class="stat-value">–</div></div>
  </div>

  <!-- Filter bar -->
  <div class="search-bar mb-16">
    <input class="form-control" id="mxSearch" placeholder="Search tickets..." oninput="filterTickets()">
    <select class="form-control" id="mxStatus" onchange="filterTickets()" style="max-width:140px">
      <option value="">All Status</option>
      <option value="open">Open</option>
      <option value="in-progress">In Progress</option>
      <option value="resolved">Resolved</option>
      <option value="closed">Closed</option>
    </select>
    <select class="form-control" id="mxPriority" onchange="filterTickets()" style="max-width:140px">
      <option value="">All Priority</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </div>

  <div id="ticketsList"><div style="color:var(--text-muted);font-size:13px">Loading tickets...</div></div>
</main>

<!-- Add Ticket Modal -->
<div class="modal-overlay" id="mxModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="mxModalTitle">New Maintenance Ticket</div>
      <button class="modal-close" onclick="closeModal('mxModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editMxId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">PC ID *</label>
          <input class="form-control" id="mx-pc" placeholder="PC-01">
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-control" id="mx-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Issue Description *</label>
        <input class="form-control" id="mx-issue" placeholder="Describe the problem clearly...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Assignee</label>
          <input class="form-control" id="mx-assignee" placeholder="Technician name">
        </div>
        <div class="form-group">
          <label class="form-label">Reported By</label>
          <input class="form-control" id="mx-reported" placeholder="Your name" value="Lab Admin">
        </div>
      </div>
      <div class="form-group" id="statusField" style="display:none">
        <label class="form-label">Status</label>
        <select class="form-control" id="mx-status">
          <option value="open">Open</option>
          <option value="in-progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="form-group" id="resolutionField" style="display:none">
        <label class="form-label">Resolution Notes</label>
        <input class="form-control" id="mx-resolution" placeholder="What was done to fix the issue?">
      </div>
      <div class="form-group">
        <label class="form-label">Additional Notes</label>
        <input class="form-control" id="mx-notes" placeholder="Any extra details...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('mxModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTicket()">Save Ticket</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  startClock();
  let allTickets = [];
  let currentEditId = null;

  async function loadTickets() {
    const res = await api.get('/maintenance');
    allTickets = res.data || [];
    renderStats(allTickets);
    renderTickets(allTickets);
  }

  function renderStats(data) {
    const total = data.length;
    const open = data.filter(t => t.status === 'open').length;
    const inProg = data.filter(t => t.status === 'in-progress').length;
    const resolved = data.filter(t => t.status === 'resolved').length;
    document.getElementById('mxStats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Tickets</div><div class="stat-value">${total}</div><div class="stat-footer">All time</div></div>
      <div class="stat-card warn"><div class="stat-label">Open</div><div class="stat-value">${open}</div><div class="stat-footer">Needs attention</div></div>
      <div class="stat-card info"><div class="stat-label">In Progress</div><div class="stat-value">${inProg}</div><div class="stat-footer">Being worked on</div></div>
      <div class="stat-card accent"><div class="stat-label">Resolved</div><div class="stat-value">${resolved}</div><div class="stat-footer">Fixed tickets</div></div>
    `;
  }

  function renderTickets(data) {
    if (!data.length) {
      document.getElementById('ticketsList').innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:40px;font-size:14px">No tickets found 🎉</div>`;
      return;
    }
    document.getElementById('ticketsList').innerHTML = data.map(t => `
      <div class="ticket-card">
        <div class="ticket-meta">
          <span class="mono" style="font-size:11px;color:var(--text-muted)">${t.ticketId}</span>
          ${statusBadge(t.priority)}
          ${statusBadge(t.status)}
        </div>
        <div class="ticket-issue">${t.issue}</div>
        <div class="ticket-details">
          <span>🖥 ${t.pcId}</span>
          <span>👤 ${t.assignee}</span>
          <span>📅 ${formatDate(t.createdAt)}</span>
          <span>📌 Reported by: ${t.reportedBy}</span>
          ${t.resolvedAt ? `<span>✅ Resolved: ${formatDate(t.resolvedAt)}</span>` : ''}
        </div>
        ${t.resolution ? `<div style="margin-top:8px;font-size:12px;color:var(--accent);background:var(--accent-light);padding:6px 10px;border-radius:6px">Resolution: ${t.resolution}</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-sm" onclick="openEditModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit / Update</button>
          ${t.status !== 'resolved' ? `<button class="btn btn-sm btn-primary" onclick="quickResolve('${t._id}','${t.pcId}')">Mark Resolved</button>` : ''}
          <button class="btn btn-sm btn-danger" onclick="deleteTicket('${t._id}','${t.ticketId}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function filterTickets() {
    const q = document.getElementById('mxSearch').value.toLowerCase();
    const s = document.getElementById('mxStatus').value;
    const p = document.getElementById('mxPriority').value;
    renderTickets(allTickets.filter(t =>
      (!q || t.issue.toLowerCase().includes(q) || t.pcId.toLowerCase().includes(q) || t.ticketId.toLowerCase().includes(q)) &&
      (!s || t.status === s) && (!p || t.priority === p)
    ));
  }

  function openAddModal() {
    currentEditId = null;
    document.getElementById('mxModalTitle').textContent = 'New Maintenance Ticket';
    ['pc','issue','assignee','notes','resolution'].forEach(id => document.getElementById('mx-'+id).value = '');
    document.getElementById('mx-reported').value = 'Lab Admin';
    document.getElementById('mx-priority').value = 'medium';
    document.getElementById('statusField').style.display = 'none';
    document.getElementById('resolutionField').style.display = 'none';
    openModal('mxModal');
  }

  function openEditModal(t) {
    currentEditId = t._id;
    document.getElementById('mxModalTitle').textContent = `Edit — ${t.ticketId}`;
    document.getElementById('mx-pc').value = t.pcId;
    document.getElementById('mx-issue').value = t.issue;
    document.getElementById('mx-priority').value = t.priority;
    document.getElementById('mx-assignee').value = t.assignee;
    document.getElementById('mx-reported').value = t.reportedBy;
    document.getElementById('mx-status').value = t.status;
    document.getElementById('mx-resolution').value = t.resolution || '';
    document.getElementById('mx-notes').value = t.notes || '';
    document.getElementById('statusField').style.display = 'block';
    document.getElementById('resolutionField').style.display = 'block';
    openModal('mxModal');
  }

  async function saveTicket() {
    const pcId = document.getElementById('mx-pc').value.trim().toUpperCase();
    const issue = document.getElementById('mx-issue').value.trim();
    if (!pcId || !issue) return showToast('PC ID and issue are required', 'error');

    const body = {
      pcId,
      issue,
      priority: document.getElementById('mx-priority').value,
      assignee: document.getElementById('mx-assignee').value || 'Unassigned',
      reportedBy: document.getElementById('mx-reported').value || 'Admin',
      notes: document.getElementById('mx-notes').value
    };

    if (currentEditId) {
      body.status = document.getElementById('mx-status').value;
      body.resolution = document.getElementById('mx-resolution').value;
    }

    const res = currentEditId
      ? await api.put(`/maintenance/${currentEditId}`, body)
      : await api.post('/maintenance', body);

    if (res.success) {
      showToast(currentEditId ? 'Ticket updated!' : 'Ticket created!');
      closeModal('mxModal');
      loadTickets();
    } else {
      showToast(res.message || 'Error saving ticket', 'error');
    }
  }

  async function quickResolve(id, pcId) {
    const resolution = prompt(`Resolution for ${pcId}? (what was done)`) || 'Issue resolved';
    const res = await api.put(`/maintenance/${id}`, { status: 'resolved', resolution });
    if (res.success) { showToast('Ticket resolved! PC set to free.'); loadTickets(); }
    else showToast(res.message, 'error');
  }

  async function deleteTicket(id, ticketId) {
    confirmAction(`Delete ${ticketId}?`, async () => {
      const res = await api.delete(`/maintenance/${id}`);
      if (res.success) { showToast(`${ticketId} deleted`); loadTickets(); }
      else showToast(res.message, 'error');
    });
  }

  loadTickets();
</script>
</body>
</html>
